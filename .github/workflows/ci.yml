name: CI project3 with Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3 

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
        - name: Deploy to EC2
          uses: appleboy/ssh-action@v0.1.6
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ubuntu
            key: ${{ secrets.EC2_SSH_PRIVATE_KEY_CICDPROJECT3 }}
            script: |
                cd /home/ubuntu/ci-cd-project-3
                git pull origin main
                pip3 install -r requirements.txt --break-system-packages
                pkill gunicorn || true
                gunicorn --bind 0.0.0.0:5000 app:app -D

        - name: Health check
          run: |
                sleep 5
                curl -f http://${{ secrets.EC2_HOST }}:5000
                
        - name: Rollback on failure
          if: failure()
          uses: appleboy/ssh-action@v0.1.6
        
          with:
           host: ${{ secrets.EC2_HOST }}
           username: ubuntu
           key: ${{ secrets.EC2_SSH_PRIVATE_KEY_CICDPROJECT3 }}
           script: |
                cd /home/ubuntu/ci-cd-project-3
                git reset --hard HEAD~1
                pip3 install -r requirements.txt --break-system-packages
                pkill gunicorn || true
                gunicorn --bind 0.0.0.0:5000 app:app -D